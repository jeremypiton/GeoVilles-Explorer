<!DOCTYPE html>
<html lang="fr" class="theme-dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoVilles Explorer — Connexion</title>
    <meta name="description"
        content="Connectez-vous à GeoVilles Explorer pour accéder au comparateur de villes françaises.">

    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            background: var(--bg-0);
        }

        .login-wrapper {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        .login-brand {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 32px;
        }

        .login-brand .brand-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1px;
        }

        .login-brand .brand-icon span {
            font-size: 16px;
            font-weight: 800;
            color: #fff;
        }

        .login-brand .brand-name {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-0);
            letter-spacing: -0.02em;
        }

        .login-card {
            background: var(--bg-1);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 28px;
        }

        .login-card h1 {
            font-size: 1.125rem;
            font-weight: 700;
            color: var(--text-0);
            margin-bottom: 6px;
            letter-spacing: -0.015em;
        }

        .login-card .subtitle {
            font-size: 0.8125rem;
            color: var(--text-3);
            margin-bottom: 24px;
        }

        /* Tabs */
        .auth-tabs {
            display: flex;
            gap: 4px;
            background: var(--bg-2);
            border-radius: var(--radius-sm);
            padding: 4px;
            margin-bottom: 24px;
        }

        .auth-tab {
            flex: 1;
            padding: 7px;
            border: none;
            border-radius: 6px;
            background: transparent;
            color: var(--text-3);
            font-family: var(--font-sans);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all .2s ease;
        }

        .auth-tab.active {
            background: var(--bg-1);
            color: var(--text-0);
            font-weight: 600;
            box-shadow: 0 1px 4px rgba(0, 0, 0, .2);
        }

        /* Form */
        .form-group {
            margin-bottom: 14px;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 500;
            color: var(--text-2);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .form-group input {
            width: 100%;
            height: 42px;
            padding: 0 14px;
            background: var(--bg-2);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text-0);
            font-family: var(--font-sans);
            font-size: 14px;
            transition: border-color .2s ease, box-shadow .2s ease;
            outline: none;
        }

        .form-group input:focus {
            border-color: var(--accent-border);
            box-shadow: 0 0 0 3px var(--accent-soft);
        }

        .form-group input::placeholder {
            color: var(--text-3);
        }

        .btn-primary {
            width: 100%;
            height: 42px;
            border: none;
            border-radius: var(--radius-sm);
            background: linear-gradient(135deg, #6366f1, #a855f7);
            color: #fff;
            font-family: var(--font-sans);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity .2s ease, transform .1s ease;
            margin-top: 6px;
            letter-spacing: -0.01em;
        }

        .btn-primary:hover {
            opacity: 0.9;
        }

        .btn-primary:active {
            transform: scale(0.99);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .error-msg {
            font-size: 12.5px;
            color: var(--danger);
            margin-top: 10px;
            min-height: 18px;
            text-align: center;
        }

        .success-msg {
            font-size: 12.5px;
            color: var(--success);
            margin-top: 10px;
            min-height: 18px;
            text-align: center;
        }

        .auth-footer {
            text-align: center;
            margin-top: 20px;
            font-size: 11px;
            color: var(--text-3);
        }

        .divider {
            height: 1px;
            background: var(--border);
            margin: 20px 0;
        }

        /* Demo badge */
        .demo-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: var(--accent-soft);
            border: 1px solid var(--accent-border);
            border-radius: 20px;
            font-size: 11px;
            color: var(--accent);
            font-weight: 500;
            margin-bottom: 16px;
        }
    </style>
</head>

<body>
    <div class="login-wrapper">
        <div class="login-brand">
            <div class="brand-icon"><span>G</span><span>E</span></div>
            <span class="brand-name">GeoVilles Explorer</span>
        </div>

        <div class="login-card">
            <h1>Bienvenue</h1>
            <p class="subtitle">Connectez-vous pour explorer les villes françaises</p>

            <!-- Tabs connexion / inscription -->
            <div class="auth-tabs">
                <button class="auth-tab active" id="tab-login">Connexion</button>
                <button class="auth-tab" id="tab-register">Créer un compte</button>
            </div>

            <!-- Formulaire Connexion -->
            <form id="form-login">
                <div class="demo-badge">
                    <span>💡</span> Mode local — vos données restent sur cet appareil
                </div>
                <div class="form-group">
                    <label for="login-email">Adresse e-mail</label>
                    <input type="email" id="login-email" placeholder="vous@exemple.fr" autocomplete="email" required>
                </div>
                <div class="form-group">
                    <label for="login-password">Mot de passe</label>
                    <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password"
                        required>
                </div>
                <button type="submit" class="btn-primary">Se connecter →</button>
                <div class="error-msg" id="login-error"></div>
            </form>

            <!-- Formulaire Inscription -->
            <form id="form-register" style="display:none;">
                <div class="demo-badge">
                    <span>💡</span> Mode local — vos données restent sur cet appareil
                </div>
                <div class="form-group">
                    <label for="reg-name">Nom complet</label>
                    <input type="text" id="reg-name" placeholder="Jean Dupont" required>
                </div>
                <div class="form-group">
                    <label for="reg-email">Adresse e-mail</label>
                    <input type="email" id="reg-email" placeholder="vous@exemple.fr" autocomplete="email" required>
                </div>
                <div class="form-group">
                    <label for="reg-password">Mot de passe</label>
                    <input type="password" id="reg-password" placeholder="min. 6 caractères" autocomplete="new-password"
                        required minlength="6">
                </div>
                <div class="form-group">
                    <label for="reg-password2">Confirmer le mot de passe</label>
                    <input type="password" id="reg-password2" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-primary">Créer mon compte →</button>
                <div class="error-msg" id="register-error"></div>
                <div class="success-msg" id="register-success"></div>
            </form>
        </div>

        <div class="auth-footer">
            BUT Science des Données · Semestre 4
        </div>
    </div>

    <script src="auth.js"></script>
</body>

</html>
